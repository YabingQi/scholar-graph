services:
  backend:
    build: ./backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - scholar_data:/app/data
    environment:
      CORS_ORIGINS: "http://localhost:5173"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_BACKEND_URL: "http://backend:8000"
    ports:
      - "5173:5173"
    depends_on:
      - backend

  # Build the local graph DB (~1 hour). Run once with:
  #   docker compose run --rm builder
  builder:
    build: ./backend
    command: python build_graph.py
    volumes:
      - scholar_data:/app/data
    profiles: ["build"]

volumes:
  scholar_data:
